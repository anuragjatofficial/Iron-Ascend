<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Global error logger to catch errors before React even loads
      window.onerror = function(message, source, lineno, colno, error) {
        // Log more details for "Script error."
        if (message === "Script error.") {
          console.error('GLOBAL SCRIPT ERROR: Cross-origin script error detected. Check CORS headers or script loading.', { source, lineno, colno });
          // Try to get more info from performance entries if possible
          try {
            const resources = performance.getEntriesByType('resource');
            const lastScript = resources.filter(r => r.initiatorType === 'script').pop();
            if (lastScript) {
              console.warn('Last script loaded before error:', lastScript.name);
            }
          } catch (e) {}
          return false;
        }
        
        // Log more details for getContext error
        if (message && message.indexOf('getContext') !== -1) {
          console.error('GLOBAL GETCONTEXT ERROR: Attempted to call getContext on undefined. Likely a canvas mounting issue.', { message, source, lineno, colno, error });
          return false;
        }

        console.error('GLOBAL ERROR:', { message, source, lineno, colno, error });
        return false;
      };

      // Also listen for unhandled promise rejections
      window.onunhandledrejection = function(event) {
        console.error('UNHANDLED REJECTION:', event.reason);
      };

      // Robust fetch fix
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return originalFetch;
            },
            set: function(v) {
              console.warn('Attempted to overwrite window.fetch. Blocking overwrite.');
            }
          });
        } catch (e) {
          console.error('Failed to redefine window.fetch via defineProperty:', e);
        }
      })();

      // Global indexOf protection
      const originalStringIndexOf = String.prototype.indexOf;
      String.prototype.indexOf = function(searchString, position) {
        if (this === undefined || this === null) {
          console.error('String.prototype.indexOf called on undefined/null. Source:', new Error().stack);
          return -1;
        }
        return originalStringIndexOf.apply(this, arguments);
      };

      const originalArrayIndexOf = Array.prototype.indexOf;
      Array.prototype.indexOf = function(searchElement, fromIndex) {
        if (this === undefined || this === null) {
          console.error('Array.prototype.indexOf called on undefined/null. Source:', new Error().stack);
          return -1;
        }
        return originalArrayIndexOf.apply(this, arguments);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" crossorigin="anonymous" src="/src/main.tsx"></script>
  </body>
</html>
